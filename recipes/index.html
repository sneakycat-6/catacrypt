<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipes — Catacrypt</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="../assets/style.css" />
    <style>
      /* ── Page header ───────────────────────────────────────── */
      .page-hero {
        padding: 3rem 0 2rem;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1.5rem;
        border-bottom: 1px solid var(--teal-border);
        margin-bottom: 2.5rem;
      }

      .page-hero-text .eyebrow {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--teal-dim);
        margin-bottom: 0.4rem;
      }

      .page-hero-text h1 {
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        color: var(--teal-bright);
        text-shadow: 0 0 28px rgba(0,229,212,0.2);
      }

      .page-hero-actions {
        display: flex;
        gap: 0.75rem;
        flex-shrink: 0;
      }

      /* ── Recipe grid ───────────────────────────────────────── */
      .recipe-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.25rem;
      }

      .recipe-card {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        cursor: pointer;
        position: relative;
        text-decoration: none;
        color: inherit;
      }

      .recipe-card h2 {
        font-size: 1.1rem;
        color: var(--teal-bright);
        line-height: 1.3;
      }

      .recipe-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        font-size: 0.78rem;
        color: var(--text-muted);
        letter-spacing: 0.03em;
      }

      .recipe-meta span {
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .recipe-arrow {
        align-self: flex-start;
        margin-top: auto;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--teal-dim);
        transition: color 0.25s;
      }

      .recipe-card:hover .recipe-arrow { color: var(--teal-bright); }

      .delete-btn {
        position: absolute;
        top: 0.9rem;
        right: 0.9rem;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1;
        padding: 0.15rem 0.3rem;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
        z-index: 2;
      }
      .delete-btn:hover { color: #e05c5c; background: rgba(224,92,92,0.08); }

      /* ── Empty state ───────────────────────────────────────── */
      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 5rem 1rem;
        color: var(--text-muted);
      }
      .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
      .empty-state h2 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
      .empty-state p { font-size: 0.88rem; margin-bottom: 1.75rem; }

      /* ── Toast ─────────────────────────────────────────────── */
      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: var(--bg-card);
        border: 1px solid var(--teal-border);
        border-radius: var(--radius);
        padding: 0.75rem 1.25rem;
        font-size: 0.85rem;
        color: var(--teal-bright);
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        z-index: 999;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a href="../index.html" class="logo-link">
        <img src="../assets/logo.png" alt="Catacrypt" class="logo-img" />
        <span class="brand">Catacrypt</span>
      </a>
      <nav>
        <a href="../books/index.html">Library</a>
        <a href="index.html" class="active">Recipes</a>
      </nav>
    </header>

    <main class="page-content">
      <div class="page-hero">
        <div class="page-hero-text">
          <p class="eyebrow">Catacrypt &rsaquo; Recipes</p>
          <h1>🍽️ Recipes</h1>
        </div>
        <div class="page-hero-actions">
          <a href="../recipes/template.md" download class="btn btn-ghost">↓ Template</a>
          <button class="btn btn-primary" id="uploadBtn">+ Add Recipe</button>
        </div>
      </div>

      <div class="recipe-grid" id="recipeGrid"></div>
    </main>

    <footer class="site-footer">
      &copy; <span id="yr"></span> Catacrypt &mdash; All rights reserved.
    </footer>

    <div class="toast" id="toast"></div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".md,text/markdown" style="display:none" />

    <script src="../assets/recipes.js"></script>
    <script>
      document.getElementById('yr').textContent = new Date().getFullYear();

      const grid      = document.getElementById('recipeGrid');
      const fileInput = document.getElementById('fileInput');
      const toastEl   = document.getElementById('toast');
      let toastTimer;

      function showToast(msg, error = false) {
        clearTimeout(toastTimer);
        toastEl.textContent = msg;
        toastEl.style.color = error ? '#e05c5c' : 'var(--teal-bright)';
        toastEl.classList.add('show');
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
      }

      function renderGrid() {
        const recipes = loadRecipes();
        grid.innerHTML = '';

        if (recipes.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="icon">🕯️</div>
              <h2>No recipes yet</h2>
              <p>Upload a <code>.md</code> file using the template to add your first recipe.</p>
              <a href="../recipes/template.md" download class="btn btn-ghost">↓ Download Template</a>
            </div>`;
          return;
        }

        recipes.forEach(r => {
          const { meta } = parseRecipe(r.raw);
          const prep  = meta.prep_time  ? `🕐 ${meta.prep_time}` : '';
          const cook  = meta.cook_time  ? `🔥 ${meta.cook_time}` : '';
          const servs = meta.servings   ? `👤 ${meta.servings}` : '';

          const card = document.createElement('a');
          card.className = 'card recipe-card';
          card.href = `recipe.html?id=${r.id}`;
          card.innerHTML = `
            <button class="delete-btn" title="Delete recipe" data-id="${r.id}">✕</button>
            <h2>${r.name}</h2>
            <div class="recipe-meta">
              ${prep  ? `<span>${prep}</span>`  : ''}
              ${cook  ? `<span>${cook}</span>`  : ''}
              ${servs ? `<span>${servs} servings</span>` : ''}
            </div>
            <span class="recipe-arrow">Open recipe &rarr;</span>`;
          grid.appendChild(card);
        });

        // Delete buttons (stop propagation so card link doesn't fire)
        grid.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();
            if (!confirm('Delete this recipe?')) return;
            deleteRecipe(btn.dataset.id);
            renderGrid();
            showToast('Recipe deleted.');
          });
        });
      }

      // ── Upload flow ──────────────────────────────────────────
      document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const recipe = addRecipe(e.target.result);
            renderGrid();
            showToast(`"${recipe.name}" added.`);
          } catch (err) {
            showToast('Could not parse the file. Check the format.', true);
          }
          fileInput.value = '';
        };
        reader.readAsText(file);
      });

      renderGrid();
    </script>
  </body>
</html>
